name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # 🔍 LINT JOB
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check HTML
        run: |
          echo "Linting HTML..."
          if ! grep -q "<html" index.html; then
            echo "HTML structure missing"
            exit 1
          fi

  # 🧪 TEST JOB
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run basic test
        run: |
          echo "Running tests..."
          test -f index.html

  # 🏗️ BUILD JOB
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build step
        run: |
          echo "Building project..."
          mkdir build
          cp -r * build/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # 🚀 DEPLOY JOB
  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
